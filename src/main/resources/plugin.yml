name: SoundBlocker
version: '${project.version}'
main: me.soundblocker.plugin.SoundBlocker
api-version: '1.21'
description: Block and replace Minecraft sounds via ProtocolLib
authors: [Admin]
depend: [ProtocolLib]

commands:
  sb:
    description: SoundBlocker main command
    aliases: [soundblocker]
    usage: /sb <block|unblock|replace|unreplace|list|reload>
    permission: soundblocker.admin

permissions:
  soundblocker.admin:
    description: Full access to SoundBlocker
    default: op
